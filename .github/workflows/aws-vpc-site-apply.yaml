name: "AWS VPC Site Apply"

on:
  push:
    branches:
      - aws-vpc-site
  workflow_dispatch:
    inputs:
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE:
        description: "TF Cloud Workspace (optional)"
        required: false
        type: string
      TF_VAR_prefix:
        description: "Prefix for resource names (optional)"
        required: false
        type: string
      TF_VAR_region:
        description: "AWS Region"
        required: true
        default: "us-east-1"
        type: string
      TF_VAR_ami_name:
        description: "CE AMI name pattern (e.g. crt-20240905*)"
        required: false
        type: string
      TF_VAR_ec2_instances_count:
        description: "Number of CE nodes (1=single, 3=multi-node HA)"
        required: false
        default: "1"
        type: string
      TF_VAR_instance_type:
        description: "EC2 instance type"
        required: false
        default: "m5.2xlarge"
        type: string
      TF_VAR_ec2_disk_size:
        description: "Root disk size in GiB"
        required: false
        default: "80"
        type: string
      TF_VAR_public_subnet_cidrs:
        description: "Public (SLO) subnet CIDRs as JSON array"
        required: false
        default: "[\"10.0.40.0/24\"]"
        type: string
      TF_VAR_private_subnet_cidrs:
        description: "Private (SLI) subnet CIDRs as JSON array"
        required: false
        default: "[\"10.0.70.0/24\"]"
        type: string
      TF_VAR_ec2_azs:
        description: "Availability zones as JSON array"
        required: false
        default: "[\"us-east-1a\"]"
        type: string
      XC_SITE_TYPE:
        description: "Site cluster type for site creation"
        required: false
        default: "single"
        type: string
      XC_ENV:
        description: "F5 XC environment"
        required: false
        default: "production"
        type: string
  workflow_call:
    inputs:
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE:
        description: "TF Cloud Workspace"
        required: false
        type: string
      TF_VAR_prefix:
        description: "Prefix for resource names"
        required: false
        type: string
      TF_VAR_region:
        description: "AWS Region"
        required: false
        type: string
      TF_VAR_ami_name:
        description: "CE AMI name pattern"
        required: false
        type: string
      TF_VAR_ec2_instances_count:
        description: "Number of CE nodes"
        required: false
        type: string
      TF_VAR_instance_type:
        description: "EC2 instance type"
        required: false
        type: string
      TF_VAR_ec2_disk_size:
        description: "Root disk size in GiB"
        required: false
        type: string
      TF_VAR_public_subnet_cidrs:
        description: "Public (SLO) subnet CIDRs as JSON array"
        required: false
        type: string
      TF_VAR_private_subnet_cidrs:
        description: "Private (SLI) subnet CIDRs as JSON array"
        required: false
        type: string
      TF_VAR_ec2_azs:
        description: "Availability zones as JSON array"
        required: false
        type: string
      TF_VAR_allowed_cidrs:
        description: "Allowed inbound CIDRs as JSON array"
        required: false
        type: string
      XC_SITE_TYPE:
        description: "Site cluster type (single or multi)"
        required: false
        type: string
      XC_ENV:
        description: "F5 XC environment (production, crt, staging, demo1)"
        required: false
        type: string
    secrets:
      TF_API_TOKEN:
        required: true
      TF_CLOUD_ORGANIZATION:
        required: true
      XC_API_TOKEN:
        required: true
      AWS_ACCESS_KEY:
        required: true
      AWS_SECRET_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: false
    outputs:
      sm_instance_ids:
        description: "CE Instance IDs"
        value: ${{ jobs.aws_vpc_site.outputs.sm_instance_ids }}
      sm_instance_public_ips:
        description: "CE Public IPs"
        value: ${{ jobs.aws_vpc_site.outputs.sm_instance_public_ips }}
      sm_instance_names:
        description: "CE Instance Names"
        value: ${{ jobs.aws_vpc_site.outputs.sm_instance_names }}
      sm_vpc_name:
        description: "VPC Name"
        value: ${{ jobs.aws_vpc_site.outputs.sm_vpc_name }}

jobs:
  aws_vpc_site:
    name: "AWS VPC Site Apply"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./f5/xc/aws-vpc-site"
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE: "aws-vpc-site"
      TF_VAR_prefix: "f5xc-ce"
      TF_VAR_region: "us-east-1"
      TF_VAR_ami_name: ""
      TF_VAR_ec2_instances_count: "1"
      TF_VAR_instance_type: "m5.2xlarge"
      TF_VAR_ec2_disk_size: "80"
      TF_VAR_public_subnet_cidrs: "[\"10.0.40.0/24\"]"
      TF_VAR_private_subnet_cidrs: "[\"10.0.70.0/24\"]"
      TF_VAR_ec2_azs: "[\"us-east-1a\"]"
      TF_VAR_allowed_cidrs: "[\"0.0.0.0/0\"]"
      XC_SITE_TYPE: "single"
      XC_ENV: "production"
    outputs:
      sm_instance_ids: ${{ steps.output_vars.outputs.sm_instance_ids }}
      sm_instance_public_ips: ${{ steps.output_vars.outputs.sm_instance_public_ips }}
      sm_instance_names: ${{ steps.output_vars.outputs.sm_instance_names }}
      sm_vpc_name: ${{ steps.output_vars.outputs.sm_vpc_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: drpotters/f5-xc-terraform-examples

      - id: apply_variables
        uses: "drpotters/f5-xc-terraform-examples/.github/actions/apply-variables@test"
        with:
          vars_json: "${{ toJSON(vars) }}"
          vars_prefix: "AWSVS_TF_VAR_"
          inputs_json: "${{ toJSON(inputs) }}"

      - name: Create or update XC site object and retrieve cluster token
        working-directory: "."
        run: |
          export API_TOKEN="${{ secrets.XC_API_TOKEN }}"
          SITE_NAME="${TF_VAR_prefix}-aws"
          SCRIPTS_DIR="$GITHUB_WORKSPACE/f5/xc/securemesh2/scripts"

          # Attempt site creation (safe to re-run; API returns error if already exists)
          bash "${SCRIPTS_DIR}/manage_sm2_site.sh" create "${SITE_NAME}" "${XC_ENV}" aws "${XC_SITE_TYPE}" || true

          # Retrieve a fresh JWT cluster token
          TOKEN=$(bash "${SCRIPTS_DIR}/manage_sm2_site.sh" token "${SITE_NAME}" "${XC_ENV}")
          if [ -z "${TOKEN}" ]; then
            echo "ERROR: Failed to retrieve cluster token for site ${SITE_NAME}"
            exit 1
          fi
          echo "TF_VAR_cluster_token=${TOKEN}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "$TF_CLOUD_WORKSPACE_AWS_VPC_SITE"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Apply
        run: terraform apply -no-color -auto-approve -input=false

      - name: Set output vars
        id: output_vars
        run: |
          sleep 10
          echo "sm_instance_ids=$(terraform-bin output -no-color -json sm_instance_ids)" >> "$GITHUB_OUTPUT"
          echo "sm_instance_public_ips=$(terraform-bin output -no-color -json sm_instance_public_ips)" >> "$GITHUB_OUTPUT"
          echo "sm_instance_names=$(terraform-bin output -no-color -json sm_instance_names)" >> "$GITHUB_OUTPUT"
          echo "sm_vpc_name=$(terraform-bin output -no-color -raw sm_vpc_name)" >> "$GITHUB_OUTPUT"

      - name: Print output vars
        run: |
          echo "sm_instance_ids: ${{ steps.output_vars.outputs.sm_instance_ids }}"
          echo "sm_instance_public_ips: ${{ steps.output_vars.outputs.sm_instance_public_ips }}"
          echo "sm_instance_names: ${{ steps.output_vars.outputs.sm_instance_names }}"
          echo "sm_vpc_name: ${{ steps.output_vars.outputs.sm_vpc_name }}"
