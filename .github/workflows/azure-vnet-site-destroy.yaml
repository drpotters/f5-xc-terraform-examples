name: "Azure VNET Site Destroy"

on:
  push:
    branches:
      - azure-vnet-site
  workflow_dispatch:
    inputs:
      TF_CLOUD_WORKSPACE_AZURE_VNET_SITE:
        description: "TF Cloud Workspace (optional)"
        required: false
        type: string
      TF_VAR_node_prefix:
        description: "Prefix used during apply (must match)"
        required: false
        type: string
      XC_ENV:
        description: "F5 XC environment"
        required: false
        default: "production"
        type: string
  workflow_call:
    inputs:
      TF_CLOUD_WORKSPACE_AZURE_VNET_SITE:
        description: "TF Cloud Workspace"
        required: false
        type: string
      TF_VAR_node_prefix:
        description: "Prefix used during apply (must match)"
        required: false
        type: string
      XC_ENV:
        description: "F5 XC environment"
        required: false
        type: string
    secrets:
      TF_API_TOKEN:
        required: true
      TF_CLOUD_ORGANIZATION:
        required: true
      XC_API_TOKEN:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_CLIENT_ID:
        required: true
      AZURE_CLIENT_SECRET:
        required: true

jobs:
  azure_vnet_site:
    name: "Azure VNET Site Destroy"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./f5/xc/azure-vnet-site"
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_CLOUD_WORKSPACE_AZURE_VNET_SITE: "azure-vnet-site"
      TF_VAR_node_prefix: "az-ce-node"
      TF_VAR_az_location: "eastus"
      TF_VAR_az_rg_name: ""
      TF_VAR_az_virtual_network: ""
      TF_VAR_az_public_subnet_name: ""
      TF_VAR_az_private_subnet_name: ""
      TF_VAR_instances: "1"
      XC_ENV: "production"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: drpotters/f5-xc-terraform-examples

      - id: apply_variables
        uses: "drpotters/f5-xc-terraform-examples/.github/actions/apply-variables@test"
        with:
          vars_json: "${{ toJSON(vars) }}"
          vars_prefix: "AZVS_TF_VAR_"
          inputs_json: "${{ toJSON(inputs) }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "$TF_CLOUD_WORKSPACE_AZURE_VNET_SITE"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Destroy
        id: destroy
        run: terraform destroy -auto-approve -input=false

      - name: Delete XC site object
        working-directory: "."
        run: |
          export API_TOKEN="${{ secrets.XC_API_TOKEN }}"
          SITE_NAME="${TF_VAR_node_prefix}-azure"
          SCRIPTS_DIR="$GITHUB_WORKSPACE/f5/xc/securemesh2/scripts"
          bash "${SCRIPTS_DIR}/manage_sm2_site.sh" delete "${SITE_NAME}" "${XC_ENV}" || true
