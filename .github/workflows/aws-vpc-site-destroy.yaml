name: "AWS VPC Site Destroy"

on:
  push:
    branches:
      - aws-vpc-site
  workflow_dispatch:
    inputs:
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE:
        description: "TF Cloud Workspace (optional)"
        required: false
        type: string
      TF_VAR_prefix:
        description: "Prefix used during apply (must match)"
        required: false
        type: string
      XC_ENV:
        description: "F5 XC environment"
        required: false
        default: "production"
        type: string
  workflow_call:
    inputs:
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE:
        description: "TF Cloud Workspace"
        required: false
        type: string
      TF_VAR_prefix:
        description: "Prefix used during apply (must match)"
        required: false
        type: string
      XC_ENV:
        description: "F5 XC environment"
        required: false
        type: string
    secrets:
      TF_API_TOKEN:
        required: true
      TF_CLOUD_ORGANIZATION:
        required: true
      XC_API_TOKEN:
        required: true
      AWS_ACCESS_KEY:
        required: true
      AWS_SECRET_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: false

jobs:
  aws_vpc_site:
    name: "AWS VPC Site Destroy"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./f5/xc/aws-vpc-site"
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_CLOUD_WORKSPACE_AWS_VPC_SITE: "aws-vpc-site"
      TF_VAR_prefix: "f5xc-ce"
      TF_VAR_region: "us-east-1"
      TF_VAR_ami_name: ""
      TF_VAR_ec2_instances_count: "1"
      XC_ENV: "production"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: drpotters/f5-xc-terraform-examples

      - id: apply_variables
        uses: "drpotters/f5-xc-terraform-examples/.github/actions/apply-variables@test"
        with:
          vars_json: "${{ toJSON(vars) }}"
          vars_prefix: "AWSVS_TF_VAR_"
          inputs_json: "${{ toJSON(inputs) }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "$TF_CLOUD_WORKSPACE_AWS_VPC_SITE"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Destroy
        id: destroy
        run: terraform destroy -auto-approve -input=false

      - name: Delete XC site object
        working-directory: "."
        run: |
          export API_TOKEN="${{ secrets.XC_API_TOKEN }}"
          SITE_NAME="${TF_VAR_prefix}-aws"
          SCRIPTS_DIR="$GITHUB_WORKSPACE/f5/xc/securemesh2/scripts"
          bash "${SCRIPTS_DIR}/manage_sm2_site.sh" delete "${SITE_NAME}" "${XC_ENV}" || true
