name: "Azure VNET Site Apply"

on:
  push:
    branches:
      - azure-vnet-site
  workflow_dispatch:
    inputs:
      TF_CLOUD_WORKSPACE_AZURE_VNET_SITE:
        description: "TF Cloud Workspace (optional)"
        required: false
        type: string
      TF_VAR_node_prefix:
        description: "Prefix for CE node names (optional)"
        required: false
        type: string
      TF_VAR_az_location:
        description: "Azure region"
        required: true
        default: "eastus"
        type: string
      TF_VAR_az_rg_name:
        description: "Azure Resource Group name"
        required: true
        type: string
      TF_VAR_az_virtual_network:
        description: "Existing VNet name"
        required: true
        type: string
      TF_VAR_az_public_subnet_name:
        description: "Existing public (SLO) subnet name"
        required: true
        type: string
      TF_VAR_az_private_subnet_name:
        description: "Existing private (SLI) subnet name"
        required: true
        type: string
      TF_VAR_az_nsg_name:
        description: "Existing NSG name to attach to SLO NIC (leave empty to skip)"
        required: false
        type: string
      TF_VAR_instances:
        description: "Number of CE nodes (1=single, 3=multi-node HA)"
        required: false
        default: "1"
        type: string
      TF_VAR_sku_flavor:
        description: "Azure VM size"
        required: false
        default: "Standard_D8_v4"
        type: string
      TF_VAR_image_version:
        description: "CE marketplace image version (e.g. 9.2024.22.0)"
        required: false
        default: "latest"
        type: string
      XC_SITE_TYPE:
        description: "Site cluster type for site creation"
        required: false
        default: "single"
        type: string
      XC_ENV:
        description: "F5 XC environment"
        required: false
        default: "production"
        type: string
  workflow_call:
    inputs:
      TF_CLOUD_WORKSPACE_AZURE_VNET_SITE:
        description: "TF Cloud Workspace"
        required: false
        type: string
      TF_VAR_node_prefix:
        description: "Prefix for CE node names"
        required: false
        type: string
      TF_VAR_az_location:
        description: "Azure region"
        required: false
        type: string
      TF_VAR_az_rg_name:
        description: "Azure Resource Group name"
        required: false
        type: string
      TF_VAR_az_virtual_network:
        description: "Existing VNet name"
        required: false
        type: string
      TF_VAR_az_public_subnet_name:
        description: "Existing public (SLO) subnet name"
        required: false
        type: string
      TF_VAR_az_private_subnet_name:
        description: "Existing private (SLI) subnet name"
        required: false
        type: string
      TF_VAR_az_nsg_name:
        description: "Existing NSG name (optional)"
        required: false
        type: string
      TF_VAR_instances:
        description: "Number of CE nodes"
        required: false
        type: string
      TF_VAR_sku_flavor:
        description: "Azure VM size"
        required: false
        type: string
      TF_VAR_disk_size:
        description: "OS disk size in GiB"
        required: false
        type: string
      TF_VAR_image_version:
        description: "CE marketplace image version"
        required: false
        type: string
      TF_VAR_image_publisher:
        description: "Marketplace image publisher"
        required: false
        type: string
      TF_VAR_image_offer:
        description: "Marketplace image offer"
        required: false
        type: string
      TF_VAR_image_sku:
        description: "Marketplace image SKU"
        required: false
        type: string
      XC_SITE_TYPE:
        description: "Site cluster type (single or multi)"
        required: false
        type: string
      XC_ENV:
        description: "F5 XC environment (production, crt, staging, demo1)"
        required: false
        type: string
    secrets:
      TF_API_TOKEN:
        required: true
      TF_CLOUD_ORGANIZATION:
        required: true
      XC_API_TOKEN:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_CLIENT_ID:
        required: true
      AZURE_CLIENT_SECRET:
        required: true
    outputs:
      sm_azure_vm_ips:
        description: "CE Public IPs"
        value: ${{ jobs.azure_vnet_site.outputs.sm_azure_vm_ips }}
      slo_nic_names:
        description: "SLO NIC Names"
        value: ${{ jobs.azure_vnet_site.outputs.slo_nic_names }}
      slo_nic_private_ips:
        description: "SLO NIC Private IPs"
        value: ${{ jobs.azure_vnet_site.outputs.slo_nic_private_ips }}
      sli_nic_names:
        description: "SLI NIC Names"
        value: ${{ jobs.azure_vnet_site.outputs.sli_nic_names }}
      sli_nic_private_ips:
        description: "SLI NIC Private IPs"
        value: ${{ jobs.azure_vnet_site.outputs.sli_nic_private_ips }}
      vm_names:
        description: "VM Names"
        value: ${{ jobs.azure_vnet_site.outputs.vm_names }}

jobs:
  azure_vnet_site:
    name: "Azure VNET Site Apply"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./f5/xc/azure-vnet-site"
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_CLOUD_WORKSPACE_AZURE_VNET_SITE: "azure-vnet-site"
      TF_VAR_node_prefix: "az-ce-node"
      TF_VAR_az_location: "eastus"
      TF_VAR_az_rg_name: ""
      TF_VAR_az_virtual_network: ""
      TF_VAR_az_public_subnet_name: ""
      TF_VAR_az_private_subnet_name: ""
      TF_VAR_az_nsg_name: ""
      TF_VAR_instances: "1"
      TF_VAR_sku_flavor: "Standard_D8_v4"
      TF_VAR_disk_size: "80"
      TF_VAR_image_version: "latest"
      TF_VAR_image_publisher: "f5-networks"
      TF_VAR_image_offer: "f5xc_customer_edge"
      TF_VAR_image_sku: "f5-distributed-cloud-ce-crt"
      XC_SITE_TYPE: "single"
      XC_ENV: "production"
    outputs:
      sm_azure_vm_ips: ${{ steps.output_vars.outputs.sm_azure_vm_ips }}
      slo_nic_names: ${{ steps.output_vars.outputs.slo_nic_names }}
      slo_nic_private_ips: ${{ steps.output_vars.outputs.slo_nic_private_ips }}
      sli_nic_names: ${{ steps.output_vars.outputs.sli_nic_names }}
      sli_nic_private_ips: ${{ steps.output_vars.outputs.sli_nic_private_ips }}
      vm_names: ${{ steps.output_vars.outputs.vm_names }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: drpotters/f5-xc-terraform-examples

      - id: apply_variables
        uses: "drpotters/f5-xc-terraform-examples/.github/actions/apply-variables@test"
        with:
          vars_json: "${{ toJSON(vars) }}"
          vars_prefix: "AZVS_TF_VAR_"
          inputs_json: "${{ toJSON(inputs) }}"

      - name: Create or update XC site object and retrieve cluster token
        working-directory: "."
        run: |
          export API_TOKEN="${{ secrets.XC_API_TOKEN }}"
          SITE_NAME="${TF_VAR_node_prefix}-azure"
          SCRIPTS_DIR="$GITHUB_WORKSPACE/f5/xc/securemesh2/scripts"

          # Attempt site creation (safe to re-run; API returns error if already exists)
          bash "${SCRIPTS_DIR}/manage_sm2_site.sh" create "${SITE_NAME}" "${XC_ENV}" azure "${XC_SITE_TYPE}" || true

          # Retrieve a fresh JWT cluster token
          TOKEN=$(bash "${SCRIPTS_DIR}/manage_sm2_site.sh" token "${SITE_NAME}" "${XC_ENV}")
          if [ -z "${TOKEN}" ]; then
            echo "ERROR: Failed to retrieve cluster token for site ${SITE_NAME}"
            exit 1
          fi
          echo "TF_VAR_cluster_token=${TOKEN}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Terraform Backend
        id: backend
        run: |
          cat > backend.tf << EOF
          terraform {
            cloud {
              organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
              workspaces {
                name = "$TF_CLOUD_WORKSPACE_AZURE_VNET_SITE"
              }
            }
          }
          EOF

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Apply
        run: terraform apply -no-color -auto-approve -input=false

      - name: Set output vars
        id: output_vars
        run: |
          sleep 10
          echo "sm_azure_vm_ips=$(terraform-bin output -no-color -json sm_azure_vm_ips)" >> "$GITHUB_OUTPUT"
          echo "slo_nic_names=$(terraform-bin output -no-color -json slo_nic_names)" >> "$GITHUB_OUTPUT"
          echo "slo_nic_private_ips=$(terraform-bin output -no-color -json slo_nic_private_ips)" >> "$GITHUB_OUTPUT"
          echo "sli_nic_names=$(terraform-bin output -no-color -json sli_nic_names)" >> "$GITHUB_OUTPUT"
          echo "sli_nic_private_ips=$(terraform-bin output -no-color -json sli_nic_private_ips)" >> "$GITHUB_OUTPUT"
          echo "vm_names=$(terraform-bin output -no-color -json vm_names)" >> "$GITHUB_OUTPUT"

      - name: Print output vars
        run: |
          echo "sm_azure_vm_ips: ${{ steps.output_vars.outputs.sm_azure_vm_ips }}"
          echo "slo_nic_names: ${{ steps.output_vars.outputs.slo_nic_names }}"
          echo "slo_nic_private_ips: ${{ steps.output_vars.outputs.slo_nic_private_ips }}"
          echo "sli_nic_names: ${{ steps.output_vars.outputs.sli_nic_names }}"
          echo "sli_nic_private_ips: ${{ steps.output_vars.outputs.sli_nic_private_ips }}"
          echo "vm_names: ${{ steps.output_vars.outputs.vm_names }}"
